<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
    <div class="title">Spielstatistik</div>

    <div class="stat">
        <div class="label">Ecken Heim</div>
        <div class="value" id="homeCorners">0</div>
    </div>

    <div class="stat">
        <div class="label">Ecken Gast</div>
        <div class="value" id="awayCorners">0</div>
    </div>

    <div class="stat">
        <div class="label">Gelbe Karten</div>
        <div class="value" id="yellowCards">0</div>
    </div>

    <div class="stat">
        <div class="label">Rote Karten</div>
        <div class="value" id="redCards">0</div>
    </div>

    <div class="stat">
        <div class="label">Freistöße</div>
        <div class="value" id="freeKicks">0</div>
    </div>

    <div class="stat">
        <div class="label">Elfmeter</div>
        <div class="value" id="penalties">0</div>
    </div>

    <div class="stat">
        <div class="label">Abseits</div>
        <div class="value" id="offsides">0</div>
    </div>

    <div class="stat">
        <div class="label">Fouls</div>
        <div class="value" id="fouls">0</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
