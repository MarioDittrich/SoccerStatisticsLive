<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Statistiken - OBS Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stats-container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.7) 100%);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 320px;
        }

        .title {
            text-align: center;
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 8px;
        }

        .team-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
            text-align: center;
        }

        .team-name {
            font-size: 1rem;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 15px;
        }

        .stat-category {
            grid-column: span 2;
            color: #ffd700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            margin-bottom: 4px;
            border-left: 2px solid #ffd700;
            padding-left: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-name {
            color: #e0e0e0;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stat-values {
            display: flex;
            gap: 15px;
            font-weight: bold;
        }

        .stat-home {
            color: #ffd700;
            font-size: 1.2rem;
            font-family: monospace;
            min-width: 35px;
            text-align: right;
        }

        .stat-away {
            color: #60a5fa;
            font-size: 1.2rem;
            font-family: monospace;
            min-width: 35px;
            text-align: right;
        }

        .separator {
            color: #666;
            margin: 0 5px;
        }

        .last-updated {
            text-align: center;
            margin-top: 12px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 8px;
        }

        .status-indicator {
            text-align: center;
            font-size: 0.55rem;
            color: #10b981;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="stats-container">
    <div class="title">⚽ LIVE STATISTIK</div>
    <div class="team-header">
        <div class="team-name">🏠 HEIM</div>
        <div class="team-name">🚀 GAST</div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="last-updated" id="lastUpdate">Wird geladen...</div>
    <div class="status-indicator" id="statusIndicator">🟢 Live</div>
</div>

<script>
    // Deine GitHub Pages URL für die stats.json
    const STATS_URL = 'https://raw.githubusercontent.com/MarioDittrich/SoccerStatisticsLive/main/stats.json';
    
    // Statistik-Kategorien (Heim und Gast separat)
    const STATS = [
        { id: 'home_corners', name: 'Ecken', icon: '🏁', category: 'Spielaktionen' },
        { id: 'away_corners', name: 'Ecken', icon: '🏁', category: 'Spielaktionen' },
        { id: 'home_yellowCards', name: 'Gelbe Karten', icon: '🟨', category: 'Verwarnungen' },
        { id: 'away_yellowCards', name: 'Gelbe Karten', icon: '🟨', category: 'Verwarnungen' },
        { id: 'home_redCards', name: 'Rote Karten', icon: '🟥', category: 'Verwarnungen' },
        { id: 'away_redCards', name: 'Rote Karten', icon: '🟥', category: 'Verwarnungen' },
        { id: 'home_freeKicks', name: 'Freistöße', icon: '⚡', category: 'Spielaktionen' },
        { id: 'away_freeKicks', name: 'Freistöße', icon: '⚡', category: 'Spielaktionen' },
        { id: 'home_penalties', name: 'Elfmeter', icon: '🎯', category: 'Torchancen' },
        { id: 'away_penalties', name: 'Elfmeter', icon: '🎯', category: 'Torchancen' },
        { id: 'home_shots', name: 'Torschüsse', icon: '🎯', category: 'Torchancen' },
        { id: 'away_shots', name: 'Torschüsse', icon: '🎯', category: 'Torchancen' },
        { id: 'home_shotsOnTarget', name: 'Schüsse aufs Tor', icon: '📊', category: 'Torchancen' },
        { id: 'away_shotsOnTarget', name: 'Schüsse aufs Tor', icon: '📊', category: 'Torchancen' },
        { id: 'home_offsides', name: 'Abseits', icon: '🚩', category: 'Spielaktionen' },
        { id: 'away_offsides', name: 'Abseits', icon: '🚩', category: 'Spielaktionen' },
        { id: 'home_fouls', name: 'Fouls', icon: '⚠️', category: 'Spielaktionen' },
        { id: 'away_fouls', name: 'Fouls', icon: '⚠️', category: 'Spielaktionen' },
        { id: 'home_goalKicks', name: 'Abstöße', icon: '🥅', category: 'Spielaktionen' },
        { id: 'away_goalKicks', name: 'Abstöße', icon: '🥅', category: 'Spielaktionen' },
        { id: 'home_throwIns', name: 'Einwürfe', icon: '🔄', category: 'Spielaktionen' },
        { id: 'away_throwIns', name: 'Einwürfe', icon: '🔄', category: 'Spielaktionen' }
    ];

    // Standard-Statistiken (alles 0)
    const DEFAULT_STATS = {};
    STATS.forEach(stat => {
        DEFAULT_STATS[stat.id] = 0;
    });

    let currentStats = { ...DEFAULT_STATS };
    let lastLoadTime = null;

    function groupByCategory() {
        const categories = {};
        STATS.forEach(stat => {
            if (!categories[stat.category]) {
                categories[stat.category] = [];
            }
            categories[stat.category].push(stat);
        });
        return categories;
    }

    function displayStats(stats) {
        const grid = document.getElementById('statsGrid');
        grid.innerHTML = '';
        
        const categories = groupByCategory();
        
        for (const [category, statsList] of Object.entries(categories)) {
            // Kategorie-Header
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'stat-category';
            categoryDiv.textContent = category;
            grid.appendChild(categoryDiv);
            
            // Gruppiere zusammengehörige Heim/Gast Stats
            const grouped = {};
            statsList.forEach(stat => {
                const baseName = stat.name;
                if (!grouped[baseName]) {
                    grouped[baseName] = { home: null, away: null };
                }
                if (stat.id.startsWith('home_')) {
                    grouped[baseName].home = stat;
                } else if (stat.id.startsWith('away_')) {
                    grouped[baseName].away = stat;
                }
            });
            
            // Zeige jede Statistik als eine Zeile mit Heim und Gast
            for (const [displayName, pair] of Object.entries(grouped)) {
                const homeValue = pair.home ? (stats[pair.home.id] || 0) : 0;
                const awayValue = pair.away ? (stats[pair.away.id] || 0) : 0;
                const icon = pair.home?.icon || pair.away?.icon || '📊';
                
                const statDiv = document.createElement('div');
                statDiv.className = 'stat-item';
                statDiv.innerHTML = `
                    <span class="stat-name">${icon} ${displayName}</span>
                    <div class="stat-values">
                        <span class="stat-home">${homeValue}</span>
                        <span class="separator">|</span>
                        <span class="stat-away">${awayValue}</span>
                    </div>
                `;
                grid.appendChild(statDiv);
            }
        }
    }

    async function loadStats() {
        try {
            // Versuche mit GitHub API (funktioniert immer)
            const apiUrl = `https://api.github.com/repos/MarioDittrich/SoccerStatisticsLive/contents/stats.json`;
            const response = await fetch(apiUrl);
            
            if (response.ok) {
                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                currentStats = { ...DEFAULT_STATS, ...content };
                lastLoadTime = new Date();
                document.getElementById('statusIndicator').innerHTML = '🟢 Live-Daten';
                document.getElementById('statusIndicator').style.color = '#10b981';
            } else {
                throw new Error('API nicht erreichbar');
            }
        } catch (error) {
            console.warn('Fehler beim Laden, zeige Standardwerte:', error);
            // Bei Fehler Standardwerte anzeigen (alles 0)
            currentStats = { ...DEFAULT_STATS };
            document.getElementById('statusIndicator').innerHTML = '🟡 Standardansicht (0:0)';
            document.getElementById('statusIndicator').style.color = '#f59e0b';
        }
        
        // Anzeige aktualisieren
        displayStats(currentStats);
        
        // Letzte Aktualisierungszeit anzeigen
        if (lastLoadTime) {
            document.getElementById('lastUpdate').innerHTML = `Aktualisiert: ${lastLoadTime.toLocaleTimeString()}`;
        } else {
            document.getElementById('lastUpdate').innerHTML = `Stand: Aktuelle Werte`;
        }
    }

    // Alle 3 Sekunden aktualisieren (für Live-Gefühl)
    loadStats();
    setInterval(loadStats, 3000);
</script>
</body>
</html>
